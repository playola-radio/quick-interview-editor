name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  # Cancel stale in-progress PR runs, but never cancel a run on main: two commits
  # landing in quick succession must each keep their own pass/fail signal.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Both jobs only check out and run tests — no writes to the repo, releases, or PRs.
permissions:
  contents: read

jobs:
  pytest:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest -q

  xcode:
    name: Xcode app (macOS)
    runs-on: macos-15
    timeout-minutes: 20
    defaults:
      run:
        working-directory: QuickInterviewEditor
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Show Xcode version
        run: xcodebuild -version

      # Installs Ruby, runs `bundle install`, and caches the gem bundle
      # (the full fastlane graph) between runs.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: QuickInterviewEditor

      - name: Install tooling (XcodeGen + SwiftLint)
        run: brew install xcodegen swiftlint

      - name: Generate Xcode project
        run: xcodegen generate

      - name: swift-format check
        run: bundle exec fastlane mac format_check

      - name: SwiftLint
        run: bundle exec fastlane mac lint_code

      - name: Run tests
        run: bundle exec fastlane mac test
