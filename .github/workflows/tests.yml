name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  # Cancel stale in-progress PR runs, but never cancel a run on main: two commits
  # landing in quick succession must each keep their own pass/fail signal.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  pytest:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest -q

  xcode:
    name: Xcode app (macOS)
    runs-on: macos-15
    defaults:
      run:
        working-directory: QuickInterviewEditor
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install tooling (XcodeGen + SwiftLint)
        run: brew install xcodegen swiftlint

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install Ruby gems (fastlane)
        run: bundle install

      - name: swift-format check
        run: bundle exec fastlane mac format_check

      - name: SwiftLint
        run: bundle exec fastlane mac lint_code

      - name: Run tests
        run: bundle exec fastlane mac test
