name: QuickInterviewEditor
options:
  deploymentTarget:
    macOS: "15.0"
  bundleIdPrefix: fm.playola
packages:
  Dependencies:
    url: https://github.com/pointfreeco/swift-dependencies
    from: "1.9.0"
  Sharing:
    url: https://github.com/pointfreeco/swift-sharing
    from: "2.5.0"
  IdentifiedCollections:
    url: https://github.com/pointfreeco/swift-identified-collections
    from: "1.1.0"
  CustomDump:
    url: https://github.com/pointfreeco/swift-custom-dump
    from: "1.3.0"
  XCTestDynamicOverlay:
    url: https://github.com/pointfreeco/xctest-dynamic-overlay
    from: "1.5.0"
targets:
  QuickInterviewEditor:
    type: application
    platform: macOS
    sources:
      - path: QuickInterviewEditor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fm.playola.QuickInterviewEditor
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_TESTABILITY: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: FSRSPV9N9Q
    dependencies:
      - package: Dependencies
        product: Dependencies
      - package: Sharing
        product: Sharing
      - package: IdentifiedCollections
        product: IdentifiedCollections
      - package: XCTestDynamicOverlay
        product: IssueReporting
  QuickInterviewEditorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: QuickInterviewEditorTests
      - path: Resources/Fixtures/edit-plan.json
        buildPhase: resources
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: FSRSPV9N9Q
    dependencies:
      - target: QuickInterviewEditor
      - package: CustomDump
        product: CustomDump
schemes:
  QuickInterviewEditor:
    build:
      targets:
        QuickInterviewEditor: all
        QuickInterviewEditorTests: [test]
    test:
      targets:
        - QuickInterviewEditorTests
